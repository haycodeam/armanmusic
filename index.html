<!DOCTYPE html>
<html lang="hy">

<head>
    <meta charset="UTF-8">
    <title>HayCode.am | Web Development Agency</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./weblogo/haycodeicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>

    <header>
        <div class="container nav">
            <div class="logo"> <img src="./weblogo/haycodeicon.png" alt=""> HayCode<span>.am</span></div>

            <nav>
                <ul>
                    <li><a href="#home" data-key="nav_home"></a></li>
                    <li><a href="#about" data-key="nav_about"></a></li>
                    <li><a href="#services" data-key="nav_services"></a></li>
                    <li><a href="#contact" data-key="nav_contact"></a></li>
                </ul>
            </nav>

            <div class="lang-switch">
                <button data-lang="hy">հայ</button>
                <button data-lang="ru">Рус</button>
                <button data-lang="en">Eng</button>
            </div>

            <div class="menu-btn">☰</div>
        </div>
    </header>

    <section id="home" class="hero">
        <div class="container hero-content">
            <h1 data-key="hero_title"></h1>
            <p data-key="hero_text"></p>
            <a href="#contact" class="btn" data-key="hero_btn"></a>
        </div>
    </section>

    <section id="about" class="about">
        <div class="container">
            <h2 data-key="about_title"></h2>
            <p data-key="about_text"></p>
            <div class="about-box" data-key="about_box"></div>
        </div>
    </section>

    <section id="services" class="services">
        <div class="container">
            <h2 data-key="services_title"></h2>

            <div class="grid">
                <div class="card" data-key="service_1"></div>
                <!-- <div class="card" data-key="service_2"></div> -->
                <div class="card" data-key="service_3"></div>
                <div class="card" data-key="service_4"></div>
                <div class="card" data-key="service_5"></div>
                <div class="card" data-key="service_6"></div>
            </div>
        </div>
    </section>

    <section id="contact" class="contact">
        <div class="container">
            <h2 data-key="contact_title"></h2>

            <form id="contactForm">
                <input type="text" data-key-placeholder="name" required>
                <input type="email" data-key-placeholder="email" required>

                <select data-key-placeholder="purpose" required>
                    <option value="" disabled selected data-key="select_purpose"></option>
                    <option value="course" data-key="purpose_course"></option>
                    <option value="website" data-key="purpose_website"></option>
                </select>

                <textarea rows="5" data-key-placeholder="message" required></textarea>
                <button type="submit" class="btn" data-key="send_btn"></button>
            </form>
        </div>
    </section>

    <footer>
        <p>© 2026 HayCode.am | All Rights Reserved</p>
    </footer>

</body>

</html>
